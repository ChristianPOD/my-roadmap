<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Christian POD: 90 Day Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #EEF4F6;
      --surface:     #F7FBFC;
      --border:      #C8DCE3;
      --ink:         #1C2B33;
      --ink-muted:   #5A7A8A;
      --accent:      #2BA99C;
      --accent-pale: #B8E8E4;
      --accent-glow: rgba(43,169,156,0.18);
      --done-text:   #1E8F84;
      --slate:       #4A6274;
      --slate-dark:  #2E4050;
      --teal-bright: #3BBFB2;
      --warn:        #C0552A;
      --radius:      14px;
      --track-w:     2px;
      --node-d:      38px;
    }

    /* ── DARK MODE ── */
    body.dark {
      --bg:          #0F1C24;
      --surface:     #172530;
      --border:      #243D4D;
      --ink:         #E8F4F8;
      --ink-muted:   #7AAABB;
      --accent:      #2BA99C;
      --accent-pale: #1A4A46;
      --accent-glow: rgba(43,169,156,0.22);
      --done-text:   #3BBFB2;
      --slate:       #4A6274;
      --slate-dark:  #2E4050;
      --teal-bright: #3BBFB2;
      --warn:        #C0552A;
    }

    /* Dark mode card adjustments */
    body.dark .milestone-card {
      background: var(--surface);
    }
    body.dark .milestone.is-done .milestone-card {
      background: linear-gradient(135deg, #122E2B 0%, #172530 100%);
    }
    body.dark .step-check {
      background: #1A2E3A;
    }
    body.dark .node {
      background: #1A2E3A;
    }
    body.dark .complete-banner {
      background: #172530;
    }
    body.dark .modal-box {
      background: #172530;
    }
    body.dark .subsection-label {
      color: #B8E8E4;
      border-color: rgba(59,191,178,0.35);
      background: rgba(59,191,178,0.1);
    }
    body.dark .phase-title {
      color: #C8E8F0;
    }
    body.dark .day-label {
      color: #7AAABB;
      opacity: 1;
    }

    /* ── LARGE TEXT MODE ── */
    body.large-text {
      font-size: 16px;
    }
    body.large-text .card-title       { font-size: 1.05rem; }
    body.large-text .step-item        { font-size: 0.9rem; }
    body.large-text .card-desc        { font-size: 0.9rem; }
    body.large-text .phase-title      { font-size: clamp(1.2rem, 3vw, 1.45rem); }
    body.large-text .subsection-label { font-size: 0.8rem; }
    body.large-text .day-label        { font-size: 0.78rem; }
    body.large-text .phase-count      { font-size: 0.85rem; }
    body.large-text .week-progress-label { font-size: 0.8rem; }
    body.large-text .three-col-header { font-size: 0.76rem; }
    body.large-text .video-badge      { font-size: 0.7rem; }
    body.large-text .milestone-card   { padding: 18px 22px; }

    /* ── DARK MODE TOGGLE ── */
    .dark-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .dark-toggle-icon {
      font-size: 0.9rem;
      line-height: 1;
    }
    .dark-toggle-track {
      width: 36px;
      height: 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.3);
      position: relative;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .dark-toggle-track.on {
      background: var(--teal-bright);
      border-color: var(--teal-bright);
    }
    .dark-toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    .dark-toggle-track.on .dark-toggle-thumb {
      transform: translateX(16px);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, var(--slate-dark) 0%, var(--slate) 60%, #3a7a8a 100%);
      border-bottom: 3px solid var(--teal-bright);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 4px 24px rgba(30,64,80,0.25);
    }

    .header-hero {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .header-logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Lora', serif;
      font-size: clamp(0.95rem, 2.2vw, 1.2rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: #ffffff;
    }
    .header-text p {
      font-size: 0.68rem;
      color: var(--accent-pale);
      margin-top: 2px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .progress-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 7px 16px;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .progress-pill .frac {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
    }
    .progress-pill .frac span { color: var(--teal-bright); }

    .ring-wrap { position: relative; width: 30px; height: 30px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-wrap .ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 3; }
    .ring-wrap .ring-fill {
      fill: none;
      stroke: var(--teal-bright);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 82.47;
      stroke-dashoffset: 82.47;
      transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 0;
    }

    /* ── PHASE SECTION ── */
    .phase {
      margin-bottom: 52px;
      opacity: 0;
      transform: translateY(22px);
      animation: rise 0.55s cubic-bezier(.4,0,.2,1) forwards;
    }
    .phase:nth-child(1) { animation-delay: 0.05s; }
    .phase:nth-child(2) { animation-delay: 0.12s; }
    .phase:nth-child(3) { animation-delay: 0.19s; }
    .phase:nth-child(4) { animation-delay: 0.26s; }
    .phase:nth-child(5) { animation-delay: 0.33s; }

    @keyframes rise {
      to { opacity:1; transform:none; }
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .phase-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--slate-dark), var(--slate));
      color: #ffffff;
      border-radius: 20px;
      padding: 4px 12px;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(46,64,80,0.25);
    }
    .phase-badge.done-badge {
      background: linear-gradient(135deg, var(--accent), var(--teal-bright));
      box-shadow: 0 2px 8px rgba(43,169,156,0.35);
    }
    .phase-title {
      font-family: 'Lora', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.3rem);
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .phase-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .phase-count {
      font-size: 0.75rem;
      color: var(--ink-muted);
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* ── COLLAPSIBLE ── */
    .phase-header, .subsection-header {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .phase-header:hover .phase-title,
    .subsection-header:hover .subsection-label {
      opacity: 0.75;
    }
    .chevron {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: var(--ink-muted);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1), opacity 0.2s;
      opacity: 0.5;
    }
    .phase-header:hover .chevron,
    .subsection-header:hover .chevron { opacity: 0.9; }
    .chevron.collapsed { transform: rotate(-90deg); }

    .collapsible-body {
      overflow: hidden;
      transition: max-height 0.38s cubic-bezier(.4,0,.2,1),
                  opacity 0.3s ease;
      max-height: 4000px;
      opacity: 1;
    }
    .collapsible-body.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }

    /* ── TIMELINE ── */
    .timeline {
      position: relative;
      padding-left: calc(var(--node-d) + 20px);
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: calc(var(--node-d)/2 - var(--track-w)/2);
      top: calc(var(--node-d)/2);
      bottom: calc(var(--node-d)/2);
      width: var(--track-w);
      background: var(--border);
      border-radius: 99px;
    }

    /* Flat timeline — no side track or nodes (inside subsections) */
    .timeline.timeline-flat {
      padding-left: 0;
    }
    .timeline.timeline-flat::before { display: none; }
    .timeline.timeline-flat .node { display: none; }

    /* ── MILESTONE ── */
    .milestone {
      position: relative;
      margin-bottom: 14px;
    }
    .milestone:last-child { margin-bottom: 0; }

    /* The circle node */
    .node {
      position: absolute;
      left: calc(-1 * (var(--node-d) + 20px));
      top: 50%;
      transform: translateY(-50%);
      width: var(--node-d);
      height: var(--node-d);
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      cursor: pointer;
      z-index: 1;
    }
    .node svg { opacity: 0; transition: opacity 0.2s, transform 0.3s; transform: scale(0.5); }

    /* The card */
    .milestone-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .milestone-card:hover {
      border-color: #C8C1B8;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transform: translateY(-1px);
    }
    .milestone-card:active { transform: translateY(0); }

    .card-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.25s, background 0.25s;
    }
    .card-check svg { opacity: 0; transition: opacity 0.2s, transform 0.25s; transform: scale(0.3); }

    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.35;
      transition: color 0.25s;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-top: 3px;
      font-weight: 300;
      line-height: 1.45;
    }

    /* ── COMPLETED STATE ── */
    .milestone.is-done .milestone-card {
      border-color: var(--accent-pale);
      background: linear-gradient(135deg, #E4F7F5 0%, #F7FBFC 100%);
    }
    .milestone.is-done .card-title {
      color: var(--done-text);
    }
    .milestone.is-done .card-check {
      background: linear-gradient(135deg, var(--accent), var(--teal-bright));
      border-color: var(--accent);
    }
    .milestone.is-done .card-check svg { opacity: 1; transform: scale(1); }
    .milestone.is-done .node {
      background: linear-gradient(135deg, var(--accent), var(--teal-bright));
      border-color: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-glow);
    }
    .milestone.is-done .node svg { opacity: 1; transform: scale(1); }

    /* pop animation on check */
    @keyframes pop {
      0%   { transform: translateY(-50%) scale(1); }
      40%  { transform: translateY(-50%) scale(1.28); }
      70%  { transform: translateY(-50%) scale(0.93); }
      100% { transform: translateY(-50%) scale(1); }
    }
    .milestone.pop .node {
      animation: pop 0.38s cubic-bezier(.4,0,.2,1);
    }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── EMPTY / COMPLETE BANNER ── */
    .complete-banner {
      display: none;
      text-align: center;
      padding: 48px 24px;
      border: 1.5px dashed var(--accent-pale);
      border-radius: var(--radius);
      margin-top: 40px;
      animation: rise 0.5s ease both;
    }
    .complete-banner.visible { display: block; }
    .complete-banner .emoji { font-size: 2.8rem; margin-bottom: 12px; }
    .complete-banner h2 {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--accent);
    }
    .complete-banner p {
      font-size: 0.82rem;
      color: var(--ink-muted);
      margin-top: 6px;
    }

    /* ── RESET BUTTON ── */
    .reset-btn {
      display: block;
      margin: 32px auto 0;
      background: none;
      border: 1.5px solid var(--border);
      color: var(--ink-muted);
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .reset-btn:hover { border-color: var(--warn); color: var(--warn); }

    /* ── SUBSECTION (week) ── */
    .subsection {
      margin-bottom: 32px;
    }
    .subsection-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .subsection-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--slate-dark);
      white-space: nowrap;
      background: linear-gradient(135deg, rgba(74,98,116,0.1), rgba(59,191,178,0.12));
      border: 1.5px solid rgba(74,98,116,0.25);
      border-radius: 20px;
      padding: 4px 12px;
    }
    .subsection-line { display: none; } /* replaced by progress bar */

    /* Week progress bar in subsection header */
    .week-progress-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .week-progress-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .week-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--teal-bright));
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }
    .week-progress-label {
      font-size: 0.7rem;
      color: var(--ink-muted);
      white-space: nowrap;
      font-weight: 400;
      min-width: 36px;
      text-align: right;
    }

    /* ── DAY GROUP inside timeline ── */
    .day-group { margin-bottom: 6px; }
    .day-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--ink-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 5px;
      padding-left: 2px;
      opacity: 0.7;
    }

    /* Step list inside a milestone card */
    .step-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      /* stop clicks bubbling to the milestone-card toggle */
    }
    .step-list.two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 12px;
    }
    @media (max-width: 480px) {
      .step-list.two-col {
        grid-template-columns: 1fr;
      }
    }

    /* Three-column step layout */
    .three-col-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px 14px;
    }
    @media (max-width: 600px) {
      .three-col-grid { grid-template-columns: 1fr; }
    }
    .three-col-header {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink-muted);
      opacity: 0.65;
      padding: 0 6px 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .three-col-col { display: flex; flex-direction: column; gap: 1px; }
    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--ink-muted);
      font-weight: 300;
      line-height: 1.4;
      cursor: pointer;
      border-radius: 6px;
      padding: 4px 6px;
      margin: 0 -6px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .step-item:hover { background: rgba(0,0,0,0.03); }
    .step-item:active { background: rgba(0,0,0,0.06); }

    .step-check {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
    }
    .step-check svg { opacity: 0; transition: opacity 0.15s, transform 0.2s; transform: scale(0.3); }

    .step-item.step-done .step-check {
      background: linear-gradient(135deg, var(--accent), var(--teal-bright));
      border-color: var(--accent);
    }
    .step-item.step-done .step-check svg { opacity: 1; transform: scale(1); }
    .step-item.step-done .step-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: var(--accent-pale);
      opacity: 0.8;
    }

    /* mini progress bar under card title when steps exist */
    .step-progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 8px;
      overflow: hidden;
    }
    .step-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--teal-bright));
      border-radius: 99px;
      transition: width 0.35s cubic-bezier(.4,0,.2,1);
    }

    /* ── HEADER WAVE ── */
    .header-wave {
      margin-top: -2px;
      line-height: 0;
    }
    .header-wave svg {
      display: block;
      width: 100%;
      height: 40px;
    }

    /* ── VIDEO BADGE ── */
    .video-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--slate-dark), var(--slate));
      border-radius: 20px;
      padding: 2px 8px 2px 6px;
      text-decoration: none;
      vertical-align: middle;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 1px 4px rgba(46,64,80,0.3);
    }
    .video-badge:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }
    .video-badge svg {
      width: 9px;
      height: 9px;
      flex-shrink: 0;
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 32px;
    }

    .return-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--slate-dark), var(--slate));
      color: #ffffff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      padding: 8px 20px;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(46,64,80,0.25);
      transition: opacity 0.2s, transform 0.15s;
    }
    .return-link:hover { opacity: 0.88; transform: translateY(-1px); }
    .return-link:active { transform: translateY(0); }

    /* ── AFFILIATE DISCLAIMER ── */
    .affiliate-disclaimer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--ink-muted);
      font-weight: 300;
      font-style: italic;
      padding: 20px 24px 32px;
      opacity: 0.7;
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      header { padding: 12px 14px 12px; }
      .header-logo { width: 34px; height: 34px; }
      main { padding-top: 24px; }
      .milestone-card { padding: 13px 14px; }
    }

    /* ── RESET MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,23,20,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.visible { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 22px;
      max-width: 340px;
      width: calc(100% - 40px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }
    .modal-box h3 {
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .modal-box p {
      font-size: 0.82rem;
      color: var(--ink-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .modal-cancel {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--ink-muted);
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .modal-cancel:hover { border-color: #C8C1B8; }
    .modal-confirm {
      background: linear-gradient(135deg, var(--slate-dark), var(--slate));
      border: none;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-confirm:hover { opacity: 0.85; }
  
    /* ── AUTH SCREEN ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, var(--slate-dark) 0%, #1a3545 50%, #0d2030 100%);
    }

    .auth-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .auth-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
      gap: 12px;
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--accent-pale);
      box-shadow: 0 4px 20px rgba(43,169,156,0.3);
    }

    .auth-logo-wrap h1 {
      font-family: 'Lora', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      text-align: center;
      line-height: 1.3;
    }

    .auth-logo-wrap p {
      font-size: 0.78rem;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      border-radius: 7px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .auth-tab.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }

    .auth-field {
      margin-bottom: 16px;
    }

    .auth-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-muted);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .auth-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .auth-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--slate-dark), var(--accent));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .auth-btn:active { transform: translateY(0); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .auth-msg {
      margin-top: 14px;
      font-size: 0.82rem;
      text-align: center;
      border-radius: 8px;
      padding: 10px 14px;
      display: none;
    }
    .auth-msg.error { background: #fde8e0; color: #a0320a; display: block; }
    .auth-msg.success { background: var(--accent-pale); color: var(--done-text); display: block; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: var(--ink-muted);
      font-size: 0.75rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── APP SCREEN ── */
    #app-screen { display: none; }
    #app-screen.visible { display: block; }

    /* ── USER BAR (shown when logged in) ── */
    .user-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-email {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.7);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sign-out-btn {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .sign-out-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* Save status indicator */
    .save-status {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.5);
      font-style: italic;
      white-space: nowrap;
      transition: opacity 0.3s;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px 24px; }
      .user-email { display: none; }
    }

  </style>
</head>

function switchTab(tab) {
  const isSignIn = tab === 'signin';
  document.getElementById('tab-signin').classList.toggle('active', isSignIn);
  document.getElementById('tab-signup').classList.toggle('active', !isSignIn);
  document.getElementById('auth-signin').style.display = isSignIn ? '' : 'none';
  document.getElementById('auth-signup').style.display = isSignIn ? 'none' : '';
}

function setMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}

async function handleSignIn() {
  if (!supabaseClient) return alert('Please set your Supabase credentials first.');
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  const btn = document.getElementById('signin-btn');
  if (!email || !password) return setMsg('signin-msg', 'Please fill in all fields.', 'error');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Sign In';
  if (error) return setMsg('signin-msg', error.message, 'error');
}

async function handleSignUp() {
  if (!supabaseClient) return alert('Please set your Supabase credentials first.');
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm  = document.getElementById('signup-confirm').value;
  const btn = document.getElementById('signup-btn');
  if (!email || !password) return setMsg('signup-msg', 'Please fill in all fields.', 'error');
  if (password !== confirm)  return setMsg('signup-msg', 'Passwords do not match.', 'error');
  if (password.length < 6)   return setMsg('signup-msg', 'Password must be at least 6 characters.', 'error');
  btn.disabled = true; btn.textContent = 'Creating account…';
  const { error } = await supabaseClient.auth.signUp({ email, password });
  btn.disabled = false; btn.textContent = 'Create Account';
  if (error) return setMsg('signup-msg', error.message, 'error');
  setMsg('signup-msg', 'Account created! Check your email to confirm, then sign in.', 'success');
}

async function handleSignOut() {
  if (!supabaseClient) return;
  await supabaseClient.auth.signOut();
}

function showApp(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('visible');
  const emailEl = document.getElementById('user-email');
  if (emailEl) emailEl.textContent = user.email;
  document.getElementById('sign-out-btn')?.addEventListener('click', handleSignOut);
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').classList.remove('visible');
}

/* ── State ── */
let progress = {};

function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { progress = {}; }
}

async function loadProgressFromSupabase() {
  if (!supabaseClient) return;
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) return;
  const { data, error } = await supabaseClient
    .from('user_progress')
    .select('completed_milestones')
    .eq('user_id', user.id)
    .single();
  if (data && data.completed_milestones) {
    progress = data.completed_milestones;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }
}
function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  syncProgressToSupabase();
}

let syncTimer = null;
function syncProgressToSupabase() {
  if (!supabaseClient) return;
  clearTimeout(syncTimer);
  setSaveStatus('Saving...');
  syncTimer = setTimeout(async () => {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;
    const { error } = await supabaseClient
      .from('user_progress')
      .upsert({ user_id: user.id, completed_milestones: progress }, { onConflict: 'user_id' });
    setSaveStatus(error ? 'Save failed' : 'Saved ✓');
    setTimeout(() => setSaveStatus(''), 2000);
  }, 800);
}

function setSaveStatus(msg) {
  const el = document.getElementById('save-status');
  if (el) el.textContent = msg;
}
function phaseMilestones(phase) {
  if (phase.subsections) {
    return phase.subsections.flatMap(s => s.days.flatMap(d => d.milestones));
  }
  return phase.milestones || [];
}

function allStepIds() {
  return PHASES.flatMap(p =>
    phaseMilestones(p).flatMap(m => {
      const ids = milestoneStepIds(m);
      return ids.length ? ids : [m.id];
    })
  );
}

function allIds() {
  // Milestone-level IDs only — used for phase count and completion detection
  return PHASES.flatMap(p => phaseMilestones(p).map(m => m.id));
}
function weekSubsections() {
  return PHASES.flatMap(p => p.subsections || []);
}

function isSubDone(sub) {
  const ms = sub.days.flatMap(d => d.milestones);
  return ms.length > 0 && ms.every(m => progress[m.id]);
}

function doneCount() {
  // Count completed weeks (subsections where all milestones are done)
  const subs = weekSubsections();
  if (subs.length > 0) return subs.filter(isSubDone).length;
  // Fallback for phases without subsections: count milestones
  return allIds().filter(id => progress[id]).length;
}
function totalCount() {
  const subs = weekSubsections();
  if (subs.length > 0) return subs.length;
  return allIds().length;
}


/* ── Render ── */
function render() {
  document.title = ROADMAP_TITLE;
  document.getElementById('roadmap-title').textContent    = ROADMAP_TITLE;
  document.getElementById('roadmap-subtitle').textContent = ROADMAP_SUBTITLE;

  const root = document.getElementById('roadmap-root');
  root.innerHTML = '';

  PHASES.forEach(phase => {
    const phaseEl = buildPhase(phase);
    root.appendChild(phaseEl);
  });

  const banner = document.createElement('div');
  banner.className = 'complete-banner' + (doneCount() === totalCount() ? ' visible' : '');
  banner.id = 'complete-banner';
  banner.innerHTML = `
    <div class="emoji">🎉</div>
    <h2>Congratulations!</h2>
    <p>You have finished the 90-Day Challenge! You built a real Christian POD business from scratch. Be proud of what you've accomplished!</p>
  `;
  root.appendChild(banner);

  const bottomBar = document.createElement('div');
  bottomBar.className = 'bottom-bar';

  const reset = document.createElement('button');
  reset.className = 'reset-btn';
  reset.textContent = 'Reset all progress';
  reset.addEventListener('click', resetAll);

  const returnLink = document.createElement('a');
  returnLink.className = 'return-link';
  returnLink.href = 'https://www.skool.com/christianpod-3841/about';
  returnLink.target = '_blank';
  returnLink.rel = 'noopener noreferrer';
  returnLink.onclick = (e) => { e.stopPropagation(); window.open('https://www.skool.com/christianpod-3841/about', '_blank', 'noopener,noreferrer'); e.preventDefault(); };
  returnLink.textContent = '← Return to ChristianPOD';

  bottomBar.appendChild(reset);
  bottomBar.appendChild(returnLink);
  root.appendChild(bottomBar);

  updateHeader();
}

function buildPhase(phase) {
  const all    = phaseMilestones(phase);
  const phaseDone = all.length > 0 && all.every(m => progress[m.id]);

  const el = document.createElement('section');
  el.className = 'phase';
  el.dataset.phase = phase.id;

  el.innerHTML = `
    <div class="phase-header" id="phdr-${phase.id}">
      <div class="phase-badge${phaseDone ? ' done-badge' : ''}">${phase.label}</div>
      <div class="phase-title">${phase.title}</div>
      <div class="phase-line"></div>
      <div class="phase-count" id="count-${phase.id}"></div>
      <svg class="chevron collapsed" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 6.75L9 11.25L13.5 6.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="collapsible-body collapsed" id="phase-body-${phase.id}"></div>
  `;

  const body = el.querySelector(`#phase-body-${phase.id}`);

  // Wire phase collapse toggle
  el.querySelector(`#phdr-${phase.id}`).addEventListener('click', (e) => {
    if (e.target.closest('.phase-badge') || e.target.closest('.phase-count')) return;
    body.classList.toggle('collapsed');
    el.querySelector('.chevron').classList.toggle('collapsed');
  });

  if (phase.subsections) {
    phase.subsections.forEach(sub => {
      const subEl = document.createElement('div');
      subEl.className = 'subsection';
      subEl.dataset.sub = sub.id;

      const subMs = sub.days.flatMap(d => d.milestones);
      const subDone = subMs.filter(m => progress[m.id]).length;
      const subTotal = subMs.length;
      const subPct = subTotal > 0 ? Math.round((subDone / subTotal) * 100) : 0;

      const hdr = document.createElement('div');
      hdr.className = 'subsection-header';
      hdr.id = `shdr-${sub.id}`;
      hdr.innerHTML = `
        <div class="subsection-label">${sub.label}</div>
        <div class="week-progress-wrap">
          <div class="week-progress-track">
            <div class="week-progress-fill" id="wpf-${sub.id}" style="width:${subPct}%"></div>
          </div>
          <div class="week-progress-label" id="wpl-${sub.id}">${subDone}/${subTotal}</div>
        </div>
        <svg class="chevron" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 6.75L9 11.25L13.5 6.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      `;
      subEl.appendChild(hdr);

      const subBody = document.createElement('div');
      subBody.className = 'collapsible-body';
      subBody.id = `sbody-${sub.id}`;

      const timeline = document.createElement('div');
      timeline.className = 'timeline timeline-flat';
      timeline.id = `timeline-${sub.id}`;
      sub.days.forEach(day => {
        const dayGroup = document.createElement('div');
        dayGroup.className = 'day-group';
        dayGroup.innerHTML = `<div class="day-label">${day.label}</div>`;
        day.milestones.forEach(m => dayGroup.appendChild(buildMilestone(m)));
        timeline.appendChild(dayGroup);
      });
      subBody.appendChild(timeline);
      subEl.appendChild(subBody);

      // Wire week collapse toggle
      hdr.addEventListener('click', () => {
        subBody.classList.toggle('collapsed');
        hdr.querySelector('.chevron').classList.toggle('collapsed');
      });
      body.appendChild(subEl);
    });
  } else {
    const timeline = document.createElement('div');
    timeline.className = 'timeline';
    timeline.id = `timeline-${phase.id}`;
    (phase.milestones || []).forEach(m => timeline.appendChild(buildMilestone(m)));
    body.appendChild(timeline);
  }

  updatePhaseCount(phase, el);
  return el;
}

function stepId(milestoneId, stepIndex) {
  return `${milestoneId}_s${stepIndex}`;
}

// Get all trackable IDs for a milestone regardless of its layout type
function milestoneStepIds(m) {
  if (m.cols) {
    return m.cols.flatMap(col => col.steps.map(s => s.id));
  }
  if (m.steps) {
    return m.steps.map((_, i) => stepId(m.id, i));
  }
  return [];
}

function buildMilestone(m) {
  const done = !!progress[m.id];
  const el = document.createElement('div');
  el.className = 'milestone' + (done ? ' is-done' : '');
  el.dataset.id = m.id;

  // Build the card title + optional step progress bar
  let cardBodyInner = `<div class="card-title">${m.title}</div>`;
  if (m.steps && m.steps.length) {
    cardBodyInner += `
      <div class="step-progress-bar">
        <div class="step-progress-fill" id="spf-${m.id}" style="width:${stepProgressPct(m)}%"></div>
      </div>
    `;
  } else if (m.desc) {
    cardBodyInner += `<div class="card-desc">${m.desc}</div>`;
  }

  el.innerHTML = `
    ${m.noNode ? '' : `<div class="node" title="Toggle ${m.title}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8.5L6.5 12L13 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>`}
    <div class="milestone-card">
      <div class="card-check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6.5L4.5 9L10 3.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-body">
        ${cardBodyInner}
      </div>
    </div>
  `;

  // Attach card/node toggle (only fires when not clicking a step)
  const card = el.querySelector('.milestone-card');
  const node = el.querySelector('.node');  // may be null if noNode
  const cardToggle = (e) => {
    if (e.target.closest('.step-list')) return; // let steps handle themselves
    toggleMilestone(m.id, el);
  };
  card.addEventListener('click', cardToggle);
  if (node) node.addEventListener('click', () => toggleMilestone(m.id, el));

  // Build step list / three-col grid inside card-body
  if (m.cols) {
    // Three-column layout
    const grid = document.createElement('div');
    grid.className = 'three-col-grid';
    grid.id = `steps-${m.id}`;
    m.cols.forEach(col => {
      const colEl = document.createElement('div');
      colEl.className = 'three-col-col';
      const hdr = document.createElement('div');
      hdr.className = 'three-col-header';
      hdr.textContent = col.header;
      colEl.appendChild(hdr);
      col.steps.forEach(step => {
        const stepDone = !!progress[step.id];
        const stepEl = document.createElement('div');
        stepEl.className = 'step-item' + (stepDone ? ' step-done' : '');
        stepEl.dataset.sid = step.id;
        stepEl.innerHTML = `
          <div class="step-check">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
              <path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="step-text">${step.text}</span>
        `;
        stepEl.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleColStep(step.id, m, el);
        });
        colEl.appendChild(stepEl);
      });
      grid.appendChild(colEl);
    });
    el.querySelector('.card-body').appendChild(grid);
  } else if (m.steps && m.steps.length) {
    const stepList = document.createElement('div');
    stepList.className = 'step-list' + (m.twoCol ? ' two-col' : '');
    stepList.id = `steps-${m.id}`;

    m.steps.forEach((step, i) => {
      const stepText = typeof step === 'string' ? step : step.text;
      const stepVideo = typeof step === 'object' && step.videoUrl ? step.videoUrl : null;
      const badgeLabel = (typeof step === 'object' && step.badgeLabel) ? step.badgeLabel : 'Watch Video';
      const sid = stepId(m.id, i);
      const stepDone = !!progress[sid];
      const stepEl = document.createElement('div');
      stepEl.className = 'step-item' + (stepDone ? ' step-done' : '');
      stepEl.dataset.sid = sid;
      const videoBadge = stepVideo
        ? `<a class="video-badge" href="${stepVideo}" target="_blank" rel="noopener" onclick="event.stopPropagation(); window.open('${stepVideo}', '_blank', 'noopener,noreferrer'); event.preventDefault();">
            <svg viewBox="0 0 9 9" fill="none"><path d="M2 1.5L7.5 4.5L2 7.5V1.5Z" fill="white"/></svg>
            ${badgeLabel}
          </a>`
        : '';
      stepEl.innerHTML = `
        <div class="step-check">
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
            <path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="step-text">${stepText}${videoBadge}</span>
      `;
      stepEl.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleStep(m, i, el);
      });
      stepList.appendChild(stepEl);
    });

    el.querySelector('.card-body').appendChild(stepList);
  }

  return el;
}

function stepProgressPct(m) {
  const ids = milestoneStepIds(m);
  if (!ids.length) return 0;
  const done = ids.filter(id => progress[id]).length;
  return Math.round((done / ids.length) * 100);
}

function toggleStep(m, stepIndex, milestoneEl) {
  const sid  = stepId(m.id, stepIndex);
  const wasDone = !!progress[sid];
  progress[sid] = !wasDone;
  saveProgress();

  // Update the step element visually
  const stepEl = milestoneEl.querySelector(`[data-sid="${sid}"]`);
  if (stepEl) stepEl.classList.toggle('step-done', !wasDone);

  // Update progress bar
  const bar = milestoneEl.querySelector(`#spf-${m.id}`);
  if (bar) bar.style.width = stepProgressPct(m) + '%';

  // Auto-complete or un-complete parent milestone when all steps are toggled
  const allStepsDone = m.steps.every((_, i) => progress[stepId(m.id, i)]);
  if (allStepsDone && !progress[m.id]) {
    // all steps checked → check the milestone
    progress[m.id] = true;
    saveProgress();
    milestoneEl.classList.add('is-done');
    milestoneEl.classList.remove('pop');
    void milestoneEl.offsetWidth;
    milestoneEl.classList.add('pop');
  } else if (!allStepsDone && progress[m.id]) {
    // a step was unchecked → uncheck the milestone
    progress[m.id] = false;
    saveProgress();
    milestoneEl.classList.remove('is-done');
  }

  // Refresh phase count + header ring + week bar
  const phaseEl = milestoneEl.closest('.phase');
  const phase   = PHASES.find(p => p.id === phaseEl?.dataset.phase);
  if (phase) updatePhaseCount(phase, phaseEl);
  updateWeekProgress(milestoneEl);
  updateHeader();

  if (doneCount() === totalCount()) { showBanner(); launchConfetti(); }
  else hideBanner();
}

function toggleMilestone(id, el) {
  const wasDone = !!progress[id];
  const isDone  = !wasDone;
  progress[id]  = isDone;

  // Find the milestone data so we can sync its steps
  const m = PHASES.flatMap(p => phaseMilestones(p)).find(x => x.id === id);

  // Sync all steps/cols to match the milestone state
  if (m) {
    const allIds = milestoneStepIds(m);
    allIds.forEach(sid => {
      progress[sid] = isDone;
      const stepEl = el.querySelector(`[data-sid="${sid}"]`);
      if (stepEl) stepEl.classList.toggle('step-done', isDone);
    });
    const bar = el.querySelector(`#spf-${id}`);
    if (bar) bar.style.width = (isDone ? 100 : 0) + '%';
  }

  saveProgress();
  el.classList.toggle('is-done', isDone);

  /* pop node */
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');

  /* update phase badge + count */
  const phaseEl = el.closest('.phase');
  const phaseId = phaseEl?.dataset.phase;
  const phase   = PHASES.find(p => p.id === phaseId);
  if (phase) updatePhaseCount(phase, phaseEl);
  updateWeekProgress(el);

  updateHeader();

  if (isDone && doneCount() === totalCount()) {
    showBanner();
    launchConfetti();
  } else {
    hideBanner();
  }
}

function toggleColStep(sid, m, milestoneEl) {
  const wasDone = !!progress[sid];
  progress[sid] = !wasDone;
  saveProgress();

  const stepEl = milestoneEl.querySelector(`[data-sid="${sid}"]`);
  if (stepEl) stepEl.classList.toggle('step-done', !wasDone);

  const bar = milestoneEl.querySelector(`#spf-${m.id}`);
  if (bar) bar.style.width = stepProgressPct(m) + '%';

  const allIds = milestoneStepIds(m);
  const allDone = allIds.every(id => progress[id]);
  if (allDone && !progress[m.id]) {
    progress[m.id] = true;
    saveProgress();
    milestoneEl.classList.add('is-done');
    milestoneEl.classList.remove('pop');
    void milestoneEl.offsetWidth;
    milestoneEl.classList.add('pop');
  } else if (!allDone && progress[m.id]) {
    progress[m.id] = false;
    saveProgress();
    milestoneEl.classList.remove('is-done');
  }

  const phaseEl = milestoneEl.closest('.phase');
  const phase   = PHASES.find(p => p.id === phaseEl?.dataset.phase);
  if (phase) updatePhaseCount(phase, phaseEl);
  updateWeekProgress(milestoneEl);
  updateHeader();
  if (doneCount() === totalCount()) { showBanner(); launchConfetti(); }
  else hideBanner();
}

function updatePhaseCount(phase, el) {
  const all    = phaseMilestones(phase);
  const donePh = all.filter(m => progress[m.id]).length;
  const total  = all.length;
  const badge  = el.querySelector('.phase-badge');
  const count  = el.querySelector(`#count-${phase.id}`);
  if (count) count.textContent = `${donePh}/${total}`;
  if (badge) badge.classList.toggle('done-badge', donePh === total);
}

function updateWeekProgress(milestoneEl) {
  // Walk up to find the subsection and refresh its week bar
  const subEl = milestoneEl.closest('.subsection');
  if (!subEl) return;
  const subId = subEl.dataset.sub;
  // Find the subsection data
  const sub = PHASES.flatMap(p => p.subsections || []).find(s => s.id === subId);
  if (!sub) return;
  const ms = sub.days.flatMap(d => d.milestones);
  const done = ms.filter(m => progress[m.id]).length;
  const total = ms.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const fill = document.getElementById(`wpf-${subId}`);
  const label = document.getElementById(`wpl-${subId}`);
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = `${done}/${total}`;
}

function updateHeader() {
  const done  = doneCount();
  const total = totalCount();
  document.getElementById('done-count').textContent  = done;
  document.getElementById('total-count').textContent = total;

  /* ring */
  const ring = document.getElementById('ring-fill');
  const circumference = 82.47;
  const pct = total > 0 ? done / total : 0;
  ring.style.strokeDashoffset = circumference * (1 - pct);
}

function showBanner() {
  const b = document.getElementById('complete-banner');
  if (b) b.classList.add('visible');
}
function hideBanner() {
  const b = document.getElementById('complete-banner');
  if (b) b.classList.remove('visible');
}

function resetAll() {
  const modal = document.getElementById('reset-modal');
  if (modal) modal.classList.add('visible');
}
function resetConfirm() {
  document.getElementById('reset-modal').classList.remove('visible');
  progress = {};
  saveProgress();
  render();
}
function resetCancel() {
  document.getElementById('reset-modal').classList.remove('visible');
}


/* ── Confetti ── */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#2BA99C','#3BBFB2','#4A6274','#B8E8E4','#2E4050','#7ecfca'];
  const pieces = Array.from({ length: 110 }, () => ({
    x:  Math.random() * canvas.width,
    y:  -10 - Math.random() * 100,
    r:  3 + Math.random() * 5,
    d:  1.5 + Math.random() * 2.5,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    tilt: Math.random() * 10 - 5,
    tiltDir: Math.random() < 0.5 ? 1 : -1,
    shape: Math.random() < 0.5 ? 'rect' : 'circle',
    w: 6 + Math.random() * 8,
    h: 5 + Math.random() * 6,
  }));

  let frame = 0;
  let raf;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.tilt * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame / 160);
      if (p.shape === 'circle') {
        ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
      } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      }
      ctx.restore();

      p.y   += p.d + frame * 0.012;
      p.x   += Math.sin(frame * 0.02 + p.tilt) * 0.8;
      p.tilt += 0.08 * p.tiltDir;
    });
    frame++;
    if (frame < 180) { raf = requestAnimationFrame(draw); }
    else { ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  cancelAnimationFrame(raf);
  frame = 0;
  draw();
}


/* ── Dark Mode ── */
function initDarkMode() {
  const toggle   = document.getElementById('dark-toggle');
  const track    = document.getElementById('dark-track');
  const saved    = localStorage.getItem('darkMode');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let dark = saved !== null ? saved === 'true' : prefersDark;

  function apply(isDark) {
    document.body.classList.toggle('dark', isDark);
    track.classList.toggle('on', isDark);
    localStorage.setItem('darkMode', isDark);
    dark = isDark;
  }

  apply(dark);
  toggle.addEventListener('click', () => apply(!dark));
}

/* ── Large Text Mode ── */
function initLargeText() {
  const toggle = document.getElementById('text-toggle');
  const track  = document.getElementById('text-track');
  const saved  = localStorage.getItem('largeText');
  let large    = saved === 'true';

  function apply(isLarge) {
    document.body.classList.toggle('large-text', isLarge);
    track.classList.toggle('on', isLarge);
    localStorage.setItem('largeText', isLarge);
    large = isLarge;
  }

  apply(large);
  toggle.addEventListener('click', () => apply(!large));
}

/* ── Boot ── */
loadProgress();
render();
initDarkMode();
initLargeText();


/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
async function boot() {
  if (!supabaseClient) {
    // No Supabase configured — run in local-only mode
    loadProgress();
    render();
    initDarkMode();
    initLargeText();
    showApp({ email: 'Local Mode' });
    return;
  }

  // Listen for auth state changes
  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      showApp(session.user);
      await loadProgressFromSupabase();
      render();
      initDarkMode();
      initLargeText();
    } else {
      showAuth();
    }
  });

  // Check existing session on load
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    showApp(session.user);
    await loadProgressFromSupabase();
    render();
    initDarkMode();
    initLargeText();
  } else {
    showAuth();
  }
}

boot();
</script>
